<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSEUF-CI Employees CRUD</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 class="display-5 fw-bold text-primary">MSEUF-CI Employees CRUD</h1>
                <p class="text-muted">Manage employee records efficiently</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-person-plus me-2"></i>Employee Information</h5>
                    </div>
                    <div class="card-body">
                        <form id="employeeForm">
                            <input type="hidden" name="ID" id="ID">
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="fname" class="form-label fw-semibold">First Name</label>
                                    <input type="text" class="form-control" name="fname" id="fname" placeholder="Enter first name">
                                </div>
                                
                                <div class="col-md-6">
                                    <label for="lname" class="form-label fw-semibold">Last Name</label>
                                    <input type="text" class="form-control" name="lname" id="lname" placeholder="Enter last name">
                                </div>
                                
                                <div class="col-md-8">
                                    <label for="email" class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control" name="email" id="email" placeholder="Enter email address">
                                </div>
                                
                                <div class="col-md-4">
                                    <label for="gender" class="form-label fw-semibold">Gender</label>
                                    <select class="form-select" name="gender" id="gender">
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <button type="button" class="btn btn-success" id="add">
                                    <i class="bi bi-plus-circle me-2"></i>Add Employee
                                </button>
                                <button type="button" class="btn btn-warning text-dark" id="upt">
                                    <i class="bi bi-pencil-square me-2"></i>Update
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-table me-2"></i>Employee Records</h5>
                        <span class="badge bg-light text-dark" id="recordCount">Loading...</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th scope="col" class="ps-4">ID</th>
                                        <th scope="col">Name</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Gender</th>
                                        <th scope="col" class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="content">
                                    <!-- Data will be populated here by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center">
                        <small>Click <i class="bi bi-pencil-square text-warning"></i> to edit or <i class="bi bi-trash text-danger"></i> to delete</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your Original Script -->
    <script src="script.js"></script>
</body>
</html>
